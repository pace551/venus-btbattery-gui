[GUI]
# Map MAC addresses to display names (6 char max per name)
# Format: MAC=Name pairs, comma-separated
# Example: 70:3e:97:08:00:62=Bat A,a4:c1:38:xx:xx:xx=Bat B
BT_NAMES =

# SOC color thresholds (percentage)
# Green: SOC >= this value
SOC_COLOR_GREEN = 60
# Yellow/orange: SOC >= this value (below green)
SOC_COLOR_YELLOW = 20
# Red: SOC >= this value (below yellow). Below this = critical (red border glow)
SOC_COLOR_RED = 10

# Maximum number of batteries to display (1-8)
MAX_BATTERIES = 8
